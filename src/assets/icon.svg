<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Full-bleed background so the icon also works as a maskable icon. -->
  <rect width="512" height="512" fill="#10b981"/>
  <!-- Subtle gradient for depth -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#g)"/>
  <!-- Centered "K" wordmark, kept within the maskable safe zone (~80%). -->
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central"
    font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="300" font-weight="800" fill="#ffffff">K</text>
</svg>
