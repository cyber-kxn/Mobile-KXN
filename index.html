<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
    <meta name="theme-color" content="#10b981" />
    <meta name="description" content="A minimal, local-first calorie, macro and workout tracker." />
    <title>KXN — Track</title>
    <!-- Set the theme before React mounts to avoid a flash of the wrong color scheme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('kxn-theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var dark = stored ? stored === 'dark' : prefersDark
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
